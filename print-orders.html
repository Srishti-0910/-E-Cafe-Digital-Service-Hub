<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Orders</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #f8f9fa;
    }

    header {
      background-color: #343a40dc;
      color: white;
      padding: 20px;
      text-align: center;
      
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #0056b3;
    }

    #confirmation {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #007bff;
      border-radius: 5px;
      background-color: #e9f7fd;
      display: none;
    }

    .delete-btn {
      background-color: #dc3545;
    }

    .delete-btn:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>

 <!-- Header Section -->
 <header class="bg-dark text-white text-center py-4">
    <button onclick="history.back()" class="btn btn-light position-absolute" style="width: 4.4%; height:5.5%; top: 0px; left: 2px;">Back</button>
    <h1>Printing Service</h1>
    <p>Please fill in the required details below.</p>
  </header>
  
<section class="py-5">
  <div class="container">
    <form id="printOrderForm">
      <div class="form-group">
        <label for="documentType">Document Type:</label>
        <select id="documentType" class="form-control" required>
          <option value="blackWhite">Black & White</option>
          <option value="color">Color</option>
        </select>
      </div>
      <div class="form-group">
        <label for="numPages">Number of Pages:</label>
        <input type="number" id="numPages" class="form-control" required min="1" placeholder="Enter number of pages">
      </div>
      <div class="form-group">
        <label for="fileUpload">Upload File:</label>
        <input type="file" id="fileUpload" class="form-control" required>
      </div>
      <button type="button" id="submitOrder">Submit Order</button>
    </form>

    <div id="orderSummary" style="display: none;">
      <h3>Order Summary</h3>
      <ul id="orderDetails"></ul>
      <button type="button" id="paymenttype">Proceed to Payment</button>
    </div>

    <div id="confirmation"></div>
  </div>
</section>
  <script>
    document.getElementById('submitOrder').addEventListener('click', function() {
      const documentType = document.getElementById('documentType').value;
      const numPages = document.getElementById('numPages').value;
      const fileUpload = document.getElementById('fileUpload').files[0];

      if (!fileUpload) {
        alert('Please upload a file.');
        return;
      }

      const pricePerPage = documentType === 'color' ? 5 : 2;
      const totalPrice = numPages * pricePerPage;

      const orderDetails = document.getElementById('orderDetails');
      orderDetails.innerHTML = `
        <li><strong>Document Type:</strong> ${documentType === 'color' ? 'Color' : 'Black & White'}</li>
        <li><strong>Number of Pages:</strong> ${numPages}</li>
        <li><strong>Total Price:</strong> ₹${totalPrice}</li>
      `;

      document.getElementById('orderSummary').style.display = 'block';
    });

    document.getElementById('paymenttype').addEventListener('click', function() {
      window.location.href = 'confirm-order.html';
    });
  </script>
</body>
<!-- Footer Section -->
<footer class="bg-dark text-white text-center py-4">
<p>&copy; 2024 E-Cafe: Your Digital Service Hub. All Rights Reserved.</p>
<p>Need assistance? <a href="mailto:support@e-cafe.com">Contact Support</a></p>
</footer>
</html>
