<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Order - E-Cafe</title>

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-color: #f8f9fa;
    }

    .payment-methods {
      margin-top: 20px;
    }

    .payment-methods label {
      margin-right: 15px;
      font-size: 1.3rem;
      color: #495057;
    }

    .order-details {
      margin-top: 30px;
    }

    .order-summary {
      background-color: #ffffff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 20px;
      margin-bottom: 30px;
    }

    .order-summary h3 {
      margin-bottom: 20px;
      font-size: 1.6rem;
      color: #343a40;
      font-weight: bold;
    }

    .order-summary p {
      font-size: 1.2rem;
      color: #495057;
    }

    .order-summary p span {
      font-weight: bold;
      color: #212529;
    }

    .confirm-btn {
      margin-top: 20px;
    }

    .confirm-btn button {
      background-color: #007bff;
      border: none;
      font-size: 1.2rem;
      padding: 12px 24px;
      width: 100%;
      border-radius: 8px;
      color: white;
      transition: background-color 0.3s ease;
    }

    .confirm-btn button:hover {
      background-color: #0056b3;
    }

    /* Improved Input Field Styling */
    .form-control {
      transition: border-color 0.3s ease;
      border-radius: 8px;
    }

    .form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
    }

    .form-check-input {
      border-radius: 5px;
    }

    /* Section Header Styling */
    h4 {
      font-size: 1.4rem;
      color: #343a40;
      font-weight: bold;
    }



    footer {
      margin-top: 50px;
      font-size: 1rem;
    }

    footer a {
      color: #007bff;
    }
  </style>
</head>

<body>

  <!-- Header Section -->
 <header class="bg-dark text-white text-center py-4">
  <button onclick="history.back()" class="btn btn-light position-absolute" style="width: 4.4%; height:5.5%; top: 0px; left: 2px;">Back</button>
  <h1>Printing Service</h1>
  <p>Please fill in the required details below.</p>
</header>

  <section class="py-5">
    <div class="container">
      <!-- Payment Methods Section -->
      <div class="payment-methods">
        <h4>Select Payment Method</h4>

        <!-- UPI Payment Option -->
        <div class="form-check">
          <input onclick="paymentinput()" type="radio" class="form-check-input" name="payment-method" id="_1234" value="1234">
          <label class="form-check-label" for="_1234">UPI</label>
          <input type="text" name="payment" id="paymentMethod1" placeholder="Enter UPI ID" style="display:none; margin-top: 10px;" class="form-control">
        </div>

        <!-- Credit Card Payment Option -->
        <div class="form-check">
          <input onclick="paymentinput()" type="radio" class="form-check-input" name="payment-method" id="_2345" value="2345">
          <label class="form-check-label" for="_2345">Credit Card</label>
          <input type="text" name="payment" id="paymentMethod2" placeholder="Enter CREDIT CARD ID" style="display:none; margin-top: 10px;" class="form-control">
        </div>

        <!-- Cash on Delivery Option -->
        <div class="form-check">
          <input type="radio" class="form-check-input" name="payment-method" id="_3456" value="3456">
          <label class="form-check-label" for="_3456">Cash on Delivery</label>
        </div>

        <!-- Paytm Payment Option -->
        <div class="form-check">
          <input onclick="paymentinput()" type="radio" class="form-check-input" name="payment-method" id="_4567" value="4567">
          <label class="form-check-label" for="_4567">Paytm</label>
          <input type="text" name="payment" id="paymentMethod3" placeholder="Enter Paytm ID" style="display:none; margin-top: 10px;" class="form-control">
        </div>
      </div>

      <!-- Confirm Order Button -->
      <div class="confirm-btn">
        <button onclick="confirmOrder()">Confirm Order</button>
      </div>
    </div>
  </section>

  <script>
    function confirmOrder() {
      const selectedPaymentMethod = document.querySelector('input[name="payment-method"]:checked');
      if (selectedPaymentMethod) {
        alert(`Order confirmed using ${selectedPaymentMethod.labels[0].textContent} method.`);
      } else {
        alert('Please select a payment method!');
      }
    }

    function paymentinput() {
      // Hide all input fields initially
      const upiField = document.getElementById("paymentMethod1");
      const cardField = document.getElementById("paymentMethod2");
      const paytmField = document.getElementById("paymentMethod3");

      upiField.style.display = "none";
      cardField.style.display = "none";
      paytmField.style.display = "none";

      // Show the corresponding input field based on the selected payment method
      if (document.getElementById("_1234").checked) {
        upiField.style.display = "block";
      } else if (document.getElementById("_2345").checked) {
        cardField.style.display = "block";
      } else if (document.getElementById("_4567").checked) {
        paytmField.style.display = "block";
      }
    }
  </script>

  <!-- Footer Section -->
  <footer class="bg-dark text-white text-center py-4">
    <p>&copy; 2024 E-Cafe: Your Digital Service Hub. All Rights Reserved.</p>
    <p>Need assistance? <a href="mailto:support@e-cafe.com">Contact Support</a></p>
  </footer>

</body>

</html>
