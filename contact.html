<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - E-Cafe</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
    }
    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      background-color: #ffffff;
      color: rgb(0, 0, 0);
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      transition: background-color 0.3s ease;
      z-index: 999;
      text-decoration: none;
    }
    .back-button:hover {
      background-color: #0056b3;
    }
    header {
      background: linear-gradient(135deg, #343a40, #495057);
    }
    header h1 {
      font-size: 3rem;
    }
    section.container {
      background-color: white;
      border-radius: 10px;
      padding: 40px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
      margin-top: -40px;
      z-index: 1;
      position: relative;
    }
    .form-group label {
      font-weight: 600;
    }
    .btn-primary {
      padding: 10px 25px;
      border-radius: 30px;
    }
    footer {
      margin-top: 60px;
    }
  </style>
</head>
<body>

  <!-- Back Button -->
  <a href="index.html" class="back-button">Back</a>

  <!-- Header Section -->
  <header class="text-white text-center py-5">
    <h1>Contact Us</h1>
    <p class="lead">We're here to help. Reach out to us!</p>
  </header>

  <!-- Contact Form Section -->
  <section class="container my-5">
    <h2 class="mb-4 text-center">Get in Touch</h2>
    <form action="#" method="POST">
      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" required placeholder="Enter your full name"/>
        </div>
        <div class="form-group col-md-6">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" required placeholder="you@example.com"/>
        </div>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" class="form-control" rows="5" required placeholder="Write your message here..."></textarea>
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-primary">Send Message</button>
      </div>
    </form>
  </section>

  <!-- Footer Section -->
  <footer class="bg-dark text-white text-center py-4">
    <p class="mb-0">&copy; 2024 E-Cafe: Your Digital Service Hub. All Rights Reserved.</p>
  </footer>

  <!-- Bootstrap JS and Dependencies -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
